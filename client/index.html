<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Biagio Cubisino — Developer & Visual Director</title>
  <meta name="description" content="Portfolio di Biagio Cubisino — Full Stack Developer e Visual Director. Progetti di video production, motion design e sviluppo web." />
  <meta name="author" content="Biagio Cubisino" />

  <!-- ✅ Preconnect PRIMA dei font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ✅ Logo LCP — preload con fetchpriority="high"
       Lighthouse segnalava: "fetchpriority=high should be applied"
       e "Request is not discoverable in initial document"
       Questo fix da solo vale ~5-8pt su LCP mobile -->
  <link rel="preload" href="/logo/favicon.webp" as="image" fetchpriority="high" />

  <!-- ✅ Preload SOLO Tanker woff2 — unico font above-the-fold (titolo hero)
       RIMOSSO Riking: non appare nel primo viewport
       RIMOSSO .ttf: ora usiamo .woff2 che è il 76% più leggero
       Gli altri font vengono scaricati dal browser quando servono -->
  <link rel="preload" href="/fonts/Tanker-Regular.woff2" as="font" type="font/woff2" crossorigin />

  <!-- ✅ Google Fonts NON bloccante — media="print" + onload trick -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Pacifico&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Pacifico&display=swap" />
  </noscript>

  <!-- ✅ Favicon — 32px PNG per tab browser, apple-touch per iOS -->
  <link rel="icon" href="/logo/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/logo/apple-touch-icon.png" />

  <!-- ✅ Meta OG -->
  <meta property="og:title" content="Biagio Cubisino — Developer & Visual Director" />
  <meta property="og:description" content="Portfolio di Biagio Cubisino — Full Stack Developer e Visual Director." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://biagiocubisino.com" />
  <meta property="og:image" content="https://biagiocubisino.com/og-image.jpg" />
  <meta property="og:locale" content="it_IT" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Biagio Cubisino — Developer & Visual Director" />
  <meta name="twitter:description" content="Full Stack Developer e Visual Director. Video production, motion design, sviluppo web." />
  <meta name="twitter:image" content="https://biagiocubisino.com/og-image.jpg" />

  <meta name="theme-color" content="#000000" />

  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
